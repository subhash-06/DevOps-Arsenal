apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-app
  namespace: default
  labels:
    app: jenkins-app
    pipeline: jenkins
    project: devops-arsenal
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: jenkins-app
  template:
    metadata:
      labels:
        app: jenkins-app
        pipeline: jenkins
        version: v1.0.0
    spec:
      containers:
      - name: jenkins-app
        image: sraavi1/jenkins-image:jenkins-1  # Will be updated by Jenkins pipeline
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        
        # Resource limits
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        
        # Health checks
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
      
      # Pod security
      securityContext:
        fsGroup: 101
      
      # Restart policy
      restartPolicy: Always