name: GitHub Actions CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'github/**'
      - '.github/workflows/ci.yaml'
  pull_request:
    branches: [ main ]
    paths:
      - 'github/**'
  workflow_dispatch:

env:
  DOCKER_IMAGE: sraavi1/github-image
  DOCKER_USERNAME: sraavi1
  CONTEXT_DIR: github
  MANIFEST_REPO: subhash-06/DevOps-Arsenal-2
  MANIFEST_PATH: k8s-githubactions/deployment.yaml

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name:  Checkout Code
        uses: actions/checkout@v4
      
      - name:  Generate Image Tag
        id: tag
        run: |
          echo "IMAGE_TAG=github-${{ github.run_number }}" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV
      
      - name:  Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name:  Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name:  Build Docker Image
        working-directory: ${{ env.CONTEXT_DIR }}
        run: |
          echo " Building Docker image: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}"
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }} ${{ env.DOCKER_IMAGE }}:github-latest
          echo " Build complete!"
      
      - name:  Test Docker Image
        run: |
          echo " Running tests..."
          
          # Check if image exists
          docker images | grep ${{ env.DOCKER_IMAGE }}
          
          # Run container for testing
          docker run -d --name test-container -p 8082:80 ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          sleep 5
          
          # Test health endpoint
          echo "Testing /health endpoint..."
          curl -f http://localhost:8082/health || exit 1
          
          # Test main page
          echo "Testing main page..."
          curl -f http://localhost:8082 || exit 1
          
          # Cleanup
          docker stop test-container
          docker rm test-container
          
          echo " All tests passed!"
      
      - name:  Security Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
      
      - name:  Generate Trivy Report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH'
      
      - name:  Push to Docker Hub
        run: |
          echo " Pushing image to Docker Hub..."
          docker push ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.DOCKER_IMAGE }}:github-latest
          echo " Image pushed successfully!"
      
      - name: Update Kubernetes Manifest
        run: |
          echo " Updating Kubernetes manifest..."
          
          # Clone manifest repository
          git clone https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/${{ env.MANIFEST_REPO }}.git manifest-repo
          cd manifest-repo
          
          # Configure git
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          
          # Update deployment file with new image tag
          sed -i 's|image: ${{ env.DOCKER_IMAGE }}:.*|image: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}|g' ${{ env.MANIFEST_PATH }}
          
          # Commit and push changes
          git add ${{ env.MANIFEST_PATH }}
          git commit -m "GitHub Actions: Update image to ${{ env.IMAGE_TAG }} [skip ci]" || echo "No changes"
          git push origin main
          
          echo "Manifest updated and pushed!"
      
      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-security-report
          path: trivy-report.json
          retention-days: 30
      
      